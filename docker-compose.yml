services:
  local_dev_atlas:
    image: mongodb/mongodb-atlas-local:8.0
    hostname: local_dev_atlas
    ports:
      - 27017:27017
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=pharma_agent
      - MONGODB_INITDB_ROOT_PASSWORD=pharma_agent
    volumes:
      - data:/data/db
      - config:/data/configdb
    networks:
      - pharma-agent-network
  api:
    container_name: pharma-agent-api
    image: pharma-agent-course-api:latest
    build:
      context: ./pharmagent-api
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://pharma_agent:pharma_agent@local_dev_atlas:27017/?directConnection=true
    ports:
      - "8000:8000"
    env_file:
      - ./pharmagent-api/.env
    volumes:
      - ./pharmagent-api/workspace:/app/workspace
      - ./pharmagent-api/data:/app/data
    networks:
      - pharma-agent-network
  ui:
    container_name: pharma-agent-ui
    build:
      context: ./pharmagent-ui
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./pharmagent-ui:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - pharma-agent-network
  evidently-ui:
    container_name: pharma-agent-evidently
    image: pharma-agent-course-api:latest
    working_dir: /app
    command: ["/app/.venv/bin/evidently", "ui", "--workspace", "/app/workspace", "--host", "0.0.0.0", "--port", "8085"]
    ports:
      - "8085:8085"
    volumes:
      - ./pharmagent-api/workspace:/app/workspace
    networks:
      - pharma-agent-network

volumes:
  data:
  config:

networks:
  pharma-agent-network:
    name: pharma-agent-network